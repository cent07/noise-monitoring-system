<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoiseSense | Reset Password</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  color:#e5e7eb;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:30px;
  right:30px;
  background:#020617;
  color:#e5e7eb;
  padding:14px 18px;
  border-radius:10px;
  border:1px solid #1e293b;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  opacity:0;
  transform:translateY(20px);
  transition:all .3s ease;
  z-index:999999;
  font-size:13px;
}
#toast.show{
  opacity:1;
  transform:translateY(0);
}
#toast.success{
  border-left:4px solid #22d3ee;
}
#toast.error{
  border-left:4px solid #ef4444;
}

/* LOADER */
#pageLoader{
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}
#pageLoader.active{
  opacity:1;
  pointer-events:all;
}

.loader{
  width:50px;
  height:50px;
  border:5px solid #1e293b;
  border-top:5px solid #22d3ee;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* CARD */
.wrapper{
  width:420px;
  background:#020617;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
  overflow:hidden;
}

/* HEADER */
.header{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #1e293b;
}
.header h1{
  margin:0;
  color:#22d3ee;
}
.header p{
  margin-top:6px;
  font-size:13px;
  color:#94a3b8;
}

/* FORM */
.form{
  padding:22px;
}

label{
  font-size:13px;
  color:#94a3b8;
}

input{
  width:100%;
  padding:11px;
  margin:6px 0 14px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  padding:11px;
  border:none;
  border-radius:8px;
  background:#22d3ee;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}
button:active{
  transform:scale(0.95);
}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:#020617;
  color:#22d3ee;
  cursor:pointer;
  border:1px solid #1e293b;
}
.back-btn:hover{
  background:#22d3ee;
  color:#020617;
}
</style>
</head>

<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- LOADER -->
<div id="pageLoader">
  <div class="loader"></div>
</div>

<div class="back-btn" onclick="goBack()">←</div>

<div class="wrapper">

<div class="header">
  <h1>🔐 Reset Password</h1>
  <p>Enter your email to receive a reset link</p>
</div>

<div class="form">

<label>Email</label>
<input id="email" type="email" placeholder="Enter your email">

<button onclick="sendReset()">SEND RESET LINK</button>

</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://vuzgotyghqsyjdjrbuwu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1emdvdHlnaHFzeWpkanJidXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMDAyMzYsImV4cCI6MjA4NTc3NjIzNn0.Dwpc6plq3t_y7PB_B4lejhfOPNkmXULYb3KIkakVsRU"
);

/* TOAST FUNCTION */
function showToast(message,type="success"){
  const toast=document.getElementById("toast");
  toast.innerText=message;
  toast.className="show "+type;

  setTimeout(()=>{
    toast.classList.remove("show");
  },3000);
}

/* BACK */
window.goBack = () => {
  pageLoader.classList.add("active");
  setTimeout(()=>location.href="auth.html",800);
};

/* RESET FUNCTION */
window.sendReset = async () => {

  const emailVal = document.getElementById("email").value.trim();

  if(!emailVal){
    showToast("Please enter your email.","error");
    return;
  }

  const { error } = await supabase.auth.resetPasswordForEmail(emailVal, {
  redirectTo: window.location.origin + "/forgot.html"
});

  if(error){
    showToast(error.message,"error");
    return;
  }

  showToast("Reset link sent! Check your email.","success");
};
</script>

</body>
</html>
