<!DOCTYPE html>
<html>
<head>
  <title>Live Audio</title>
</head>
<body style="font-family: Arial; text-align: center; padding-top: 50px;">

<h2>🎧 Live Audio Monitor</h2>

<button onclick="startAudio()">▶ Play</button>
<button onclick="stopAudio()">⏹ Stop</button>

<p id="status">Status: Stopped</p>

<script>
let ws;
let audioCtx;
let processor;

function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  ws = new WebSocket("wss://noise-monitoring-system.onrender.com");

  ws.binaryType = "arraybuffer";

  ws.onmessage = (event) => {
    const input = new Int16Array(event.data);

    // convert to Float32
    const float32 = new Float32Array(input.length);
    for (let i = 0; i < input.length; i++) {
      float32[i] = input[i] / 32768;
    }

    // create audio buffer
    const buffer = audioCtx.createBuffer(1, float32.length, 16000);
    buffer.copyToChannel(float32, 0);

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start();
  };

  document.getElementById("status").innerText = "Playing 🔊";
}

function stopAudio() {
  if (ws) ws.close();
  if (audioCtx) audioCtx.close();

  document.getElementById("status").innerText = "Stopped";
}
</script>

</body>
</html>
