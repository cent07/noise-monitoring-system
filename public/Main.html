<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoiseSense Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div class="brand">⚡ NoiseSense</div>
  <div class="actions">
  <a href="auth.html" class="login-btn">Login</a>
</div>
</div>
<!-- REALTIME -->
<div class="container">

<h2 class="section-title">Realtime Analytics</h2>

<div class="analytics">

  <!-- LIVE CARD -->
  <div class="live-card">
    <h3>LIVE NOISE</h3>

    <div id="noiseValue" class="live-value">--</div>

    <div class="live-bar">
      <div id="liveBarFill"></div>
    </div>

    <div class="live-info">
      <p id="deviceName">Device: --</p>
      <p id="deviceLocation">Location: --</p>
      <span id="deviceStatus" class="status online">ONLINE</span>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="graph-card">
    <div id="react-root"></div>
  </div>

</div>

<!-- DEVICES -->
<div class="devices-panel">
  <h3>Select Device</h3>

  <table class="devices-table">
    <thead>
      <tr>
        <th>Device</th>
        <th>Location</th>
      </tr>
    </thead>
    <tbody id="devicesBody"></tbody>
  </table>
</div>

</div>

<!-- REACT GRAPH -->
<script type="module" src="reactGraph/assets/index-C4y6rX97.js"></script>

<!-- MAIN JS -->
<script type="module" src="js/main.js"></script>

</body>
</html>
