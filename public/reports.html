<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoiseSense | Reports</title>

<link rel="stylesheet" href="css/reports.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="app-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
<div class="logo" onclick="location.href='index.html'">🔊 Tahimik Hero</div>

<nav class="menu">
<a href="index.html">Dashboard</a>
<a href="threshold.html">Threshold Rules</a>
<a href="alerts.html">Alerts</a>
<a href="map.html">Noise Map</a>
<a href="reports.html" class="active">Reports</a>
<a href="register_device.html">Register Device</a>
<a href="users.html">User Management</a>
</nav>

<div class="logout">
  <a href="#" id="logoutBtn">Logout</a>
</div>
</aside>

<!-- MAIN -->
<div class="main-content">

<h1 class="page-title">Noise Reports</h1>

<div class="devices-panel">

<!-- FILTER -->
<div class="report-controls">
<select id="deviceFilter" class="report-select">
<option value="all">All Devices</option>
</select>

<select id="rangeFilter" class="report-select">
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>
</select>
</div>

<!-- SUMMARY -->
<div class="summary-grid">
<div class="summary-card">
<h4>Average Noise</h4>
<h2 id="avgNoise">--</h2>
</div>

<div class="summary-card">
<h4>Peak Noise</h4>
<h2 id="peakNoise">--</h2>
</div>

<div class="summary-card">
<h4>Total Records</h4>
<h2 id="totalRecords">--</h2>
</div>
</div>

<!-- GRAPH -->
<div class="chart-box">
<h3 class="section-title">Noise Analytics</h3>

<div id="loadingState" class="state-box">Loading data...</div>

<div id="emptyState" class="state-box" style="display:none;">
No data available
</div>

<!-- 🔥 REACT ROOT -->
<div id="react-root" style="width:100%; height:360px;"></div>

</div>

</div>
</div>
</div>
<!-- LOGOUT MODAL -->
<div id="logoutModal" class="modal-overlay">
  <div class="modal-card">
    <h3>Confirm Logout</h3>
    <p>Are you sure you want to logout?</p>

    <div class="modal-actions">
      <button class="btn-cancel" id="cancelLogout">Cancel</button>
      <button class="btn-confirm" id="confirmLogout">Logout</button>
    </div>
  </div>
</div>

<!-- 🔥 REACT BUILD -->
<script type="module" src="dist/assets/index-D3FHG1Hl.js"></script>

<!-- 🔥 LOGIC -->
<script type="module" src="js/reports.js"></script>

</body>
</html>
