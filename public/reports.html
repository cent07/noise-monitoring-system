<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoiseSense | Reports</title>

<link rel="stylesheet" href="css/reports.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
<div class="logo">⚡ NoiseSense</div>

<nav class="menu">
<a href="index.html">Dashboard</a>
<a href="threshold.html">Threshold Rules</a>
<a href="alerts.html">Alerts</a>
<a href="map.html">Noise Map</a>
<a href="reports.html" class="active">Reports</a>
<a href="register_device.html">Register Device</a>
</nav>

<div class="logout">
<a href="#">Logout</a>
</div>
</aside>

<!-- MAIN -->
<div class="main-content">

<h1 class="page-title">Noise Reports</h1>

<div class="devices-panel">

<!-- FILTER -->
<div class="report-controls">
<select id="deviceFilter" class="report-select">
<option value="all">All Devices</option>
</select>

<select id="rangeFilter" class="report-select">
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>
</select>
</div>

<!-- SUMMARY -->
<div class="summary-grid">
<div class="summary-card">
<h4>Average Noise</h4>
<h2 id="avgNoise">--</h2>
</div>

<div class="summary-card">
<h4>Peak Noise</h4>
<h2 id="peakNoise">--</h2>
</div>

<div class="summary-card">
<h4>Total Records</h4>
<h2 id="totalRecords">--</h2>
</div>
</div>

<!-- GRAPH -->
<div class="chart-box">
<h3 class="section-title">Noise Analytics</h3>
<canvas id="mainChart"></canvas>
</div>

</div>
</div>
</div>

<script type="module" src="js/reports.js"></script>

</body>
</html>
