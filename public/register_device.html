<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoiseSense | Register Device</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="app-layout">

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="logo">⚡ NoiseSense</div>

<nav class="menu">
<a href="index.html">Dashboard</a>
<a href="threshold.html">Threshold Rules</a>
<a href="alerts.html">Alerts</a>
<a href="map.html">Noise Map</a>
<a href="reports.html">Reports</a>
<a href="register_device.html" class="active">Register Device</a>
</nav>

<div class="logout">
<a href="#" id="logoutBtn">Logout</a>
</div>

</aside>

<!-- MAIN -->
<div class="main-content">

<h1 class="page-title">Register Device</h1>

<div class="devices-panel" style="max-width:500px;">

<h3>Add New Device</h3>

<input id="deviceName" class="alert-search" placeholder="Device name (ex: ESP32_1)">
<input id="location" class="alert-search" placeholder="Location (ex: CCTE dept)">

<button id="openConfirm" class="btn-save" style="margin-top:10px;">
Register Device
</button>

</div>

</div>

</div>

<!-- CONFIRM MODAL -->
<div id="registerModal" class="modal-overlay">
<div class="modal-card">
<h3>Confirm registration</h3>

<p>
Device : <b id="cDevice"></b><br>
Location : <b id="cLocation"></b>
</p>

<div class="modal-actions">
<button class="btn-cancel" id="cancelRegister">Cancel</button>
<button class="btn-save" id="confirmRegister">Register</button>
</div>

</div>
</div>

<!-- DUPLICATE MODAL -->
<div id="duplicateModal" class="modal-overlay">
<div class="modal-card">
<h3>Device already exists</h3>

<p>
<b id="dupDevice"></b> is already registered.
</p>

<div class="modal-actions">
<button class="btn-cancel" id="closeDuplicate">OK</button>
</div>

</div>
</div>

<script type="module">

import { createClient } from
"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://vuzgotyghqsyjdjrbuwu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1emdvdHlnaHFzeWpkanJidXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMDAyMzYsImV4cCI6MjA4NTc3NjIzNn0.Dwpc6plq3t_y7PB_B4lejhfOPNkmXULYb3KIkakVsRU"
);

/* AUTH */

const { data:{ session } } = await supabase.auth.getSession();
if(!session) location.href="auth.html";

/* LOGOUT */

document.getElementById("logoutBtn").onclick = async (e)=>{
e.preventDefault();
await supabase.auth.signOut();
location.href="auth.html";
};

/* ELEMENTS */

const deviceNameInput = document.getElementById("deviceName");
const locationInput   = document.getElementById("location");

const registerModal  = document.getElementById("registerModal");
const duplicateModal = document.getElementById("duplicateModal");

const openConfirm    = document.getElementById("openConfirm");
const cancelRegister = document.getElementById("cancelRegister");
const confirmRegister= document.getElementById("confirmRegister");

const cDevice   = document.getElementById("cDevice");
const cLocation = document.getElementById("cLocation");

const dupDevice = document.getElementById("dupDevice");
const closeDuplicate = document.getElementById("closeDuplicate");

/* OPEN CONFIRM */

openConfirm.onclick = ()=>{

const name = deviceNameInput.value.trim();
const loc  = locationInput.value.trim();

if(!name || !loc){
alert("Please complete all fields.");
return;
}

cDevice.textContent   = name;
cLocation.textContent = loc;

registerModal.classList.add("show");
};

cancelRegister.onclick = ()=>{
registerModal.classList.remove("show");
};

closeDuplicate.onclick = ()=>{
duplicateModal.classList.remove("show");
};

/* REGISTER */

confirmRegister.onclick = async ()=>{

registerModal.classList.remove("show");

const name = deviceNameInput.value.trim();
const loc  = locationInput.value.trim();

const { data:existing } = await supabase
.from("devices")
.select("id")
.eq("device_name",name)
.maybeSingle();

if(existing){
dupDevice.textContent = name;
duplicateModal.classList.add("show");
return;
}

const { error } = await supabase
.from("devices")
.insert({
device_name:name,
location:loc
});

if(error){
alert(error.message);
return;
}

setTimeout(()=>{
location.href="index.html";
},600);

};

</script>

</body>
</html>
