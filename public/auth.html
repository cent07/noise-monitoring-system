<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoiseSense | Login</title>

<style>
/* ===== BASE ===== */
*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  color:#e5e7eb;
}

/* ===== CARD ===== */
.auth-wrapper{
  width:420px;
  background:#020617;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
  overflow:hidden;
}

/* ===== HEADER ===== */
.auth-header{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #1e293b;
}
.auth-header h1{
  margin:0;
  color:#22d3ee;
  font-size:1.6rem;
}
.auth-header p{
  margin-top:6px;
  font-size:13px;
  color:#94a3b8;
}

/* ===== SOUND WAVE ===== */
.sound-wave{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  height:36px;
  gap:4px;
  margin-top:10px;
}
.sound-wave span{
  width:6px;
  background:#22d3ee;
  border-radius:4px;
  animation:wave 1.2s infinite ease-in-out;
}
.sound-wave span:nth-child(1){animation-delay:0s}
.sound-wave span:nth-child(2){animation-delay:.1s}
.sound-wave span:nth-child(3){animation-delay:.2s}
.sound-wave span:nth-child(4){animation-delay:.3s}
.sound-wave span:nth-child(5){animation-delay:.4s}
@keyframes wave{
  0%,100%{height:8px;opacity:.4}
  50%{height:30px;opacity:1}
}

/* ===== TABS ===== */
.auth-tabs{
  display:flex;
}
.auth-tabs div{
  flex:1;
  text-align:center;
  padding:14px;
  cursor:pointer;
  font-weight:600;
  color:#94a3b8;
  background:#020617;
  transition:.3s;
}
.auth-tabs div.active{
  color:#22d3ee;
  background:#0f172a;
  border-bottom:2px solid #22d3ee;
}

/* ===== FORMS ===== */
.form{
  padding:22px;
  display:none;
  opacity:0;
  transform:translateY(15px);
  transition:.4s ease;
}
.form.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

label{
  font-size:13px;
  color:#94a3b8;
}
input{
  width:100%;
  padding:11px;
  margin:6px 0 14px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:#e5e7eb;
}

button{
  width:100%;
  padding:11px;
  border:none;
  border-radius:8px;
  background:#22d3ee;
  color:#020617;
  font-weight:700;
  cursor:pointer;
}
button:hover{
  background:#0ea5e9;
}

.auth-footer{
  text-align:center;
  padding:14px;
  font-size:12px;
  color:#64748b;
  border-top:1px solid #1e293b;
}
</style>
</head>

<body>

<div class="auth-wrapper">

  <div class="auth-header">
    <h1>🔊 NoiseSense</h1>
    <p>Smart Noise Monitoring System</p>
    <div class="sound-wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="auth-tabs">
    <div class="active" onclick="switchTab('login',this)">LOGIN</div>
    <div onclick="switchTab('signup',this)">SIGN UP</div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="form active">
    <label>Email</label>
    <input id="loginEmail" type="email" placeholder="Enter email">

    <label>Password</label>
    <input id="loginPass" type="password" placeholder="Enter password">

    <button onclick="login()">LOGIN</button>
  </div>

  <!-- SIGN UP -->
  <div id="signup" class="form">
    <label>Email</label>
    <input id="regEmail" type="email" placeholder="Enter email">

    <label>Password</label>
    <input id="regPass" type="password" placeholder="Create password">

    <label>Confirm Password</label>
    <input id="regConfirm" type="password" placeholder="Confirm password">

    <button onclick="signup()">CREATE ACCOUNT</button>
  </div>

  <div class="auth-footer">
    © 2026 NoiseSense System
  </div>

</div>

<!-- ================= SUPABASE AUTH ================= -->
<script type="module">
import { createClient } from
  "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://vuzgotyghqsyjdjrbuwu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1emdvdHlnaHFzeWpkanJidXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMDAyMzYsImV4cCI6MjA4NTc3NjIzNn0.Dwpc6plq3t_y7PB_B4lejhfOPNkmXULYb3KIkakVsRU";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

/* already logged in? */
const { data:{ session } } = await supabase.auth.getSession();
if(session){
  location.href = "index.html";
}

/* SIGN UP */
window.signup = async () => {

  const email = regEmail.value.trim();
  const pass  = regPass.value.trim();
  const conf  = regConfirm.value.trim();

  if(!email || !pass){
    alert("Complete all fields");
    return;
  }

  if(pass !== conf){
    alert("Passwords do not match");
    return;
  }

  const { error } = await supabase.auth.signUp({
    email,
    password: pass
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("Account created. You can now login.");
  switchTab("login", document.querySelectorAll(".auth-tabs div")[0]);
};


/* LOGIN */
window.login = async () => {

  const email = loginEmail.value.trim();
  const pass  = loginPass.value.trim();

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: pass
  });

  if(error){
    alert(error.message);
    return;
  }

  location.href = "index.html";
};


/* UI */
window.switchTab = (tab, el) => {
  document.querySelectorAll(".form").forEach(f => f.classList.remove("active"));
  document.querySelectorAll(".auth-tabs div").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
  el.classList.add("active");
};
</script>

</body>
</html>
