<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoiseSense | Login</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  color:#e5e7eb;
}

/* LOADER */
#pageLoader{
  position:fixed;
  inset:0;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}
#pageLoader.active{
  opacity:1;
  pointer-events:all;
}
.loader-spinner{
  width:50px;
  height:50px;
  border:5px solid #1e293b;
  border-top:5px solid #22d3ee;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

/* CARD */
.auth-wrapper{
  width:420px;
  background:#020617;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
  overflow:hidden;
}

/* HEADER */
.auth-header{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #1e293b;
}
.auth-header h1{
  margin:0;
  color:#22d3ee;
}
.auth-header p{
  margin-top:6px;
  font-size:13px;
  color:#94a3b8;
}

/* SOUND */
.sound-wave{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  height:36px;
  gap:4px;
  margin-top:10px;
}
.sound-wave span{
  width:6px;
  background:#22d3ee;
  border-radius:4px;
  animation:wave 1.2s infinite ease-in-out;
}
@keyframes wave{
  0%,100%{height:8px;opacity:.4}
  50%{height:30px;opacity:1}
}

/* TABS */
.auth-tabs{
  display:flex;
}
.auth-tabs div{
  flex:1;
  text-align:center;
  padding:14px;
  cursor:pointer;
  font-weight:600;
  color:#94a3b8;
}
.auth-tabs .active{
  color:#22d3ee;
  border-bottom:2px solid #22d3ee;
}

/* FORM */
.form{
  padding:22px;
  display:none;
}
.form.active{
  display:block;
}

/* INPUT */
input{
  width:100%;
  padding:11px;
  margin:6px 0; /* 🔥 FIXED (no more 14px) */
  border-radius:8px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:#fff;
}

/* PASSWORD FIELD */
.password-field{
  position:relative;
  margin-bottom:14px;
}

.password-field input{
  margin:0; /* 🔥 IMPORTANT FIX */
  padding-right:45px;
}

/* SHOW PASSWORD ICON */
.toggle-pass{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);

  width:24px;
  height:24px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;
  color:#22d3ee;
}

.toggle-pass svg{
  width:18px;
  height:18px;
  pointer-events:none;
}

/* visible */
.toggle-pass.show{
  color:#22d3ee;
}
.toggle-pass.hide{
  color:#64748b;
}

.toggle-pass.hide::after{
  content:"";
  position:absolute;
  width:16px;
  height:2px;
  background:#64748b;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) rotate(45deg);
}

/* BUTTON */
button{
  width:100%;
  padding:11px;
  border:none;
  border-radius:8px;
  background:#22d3ee;
  font-weight:700;
  cursor:pointer;
  transition:.25s;
  position:relative;
}
button:active{
  transform:scale(.95);
}
button.loading{
  pointer-events:none;
  background:#0ea5e9;
  color:transparent;
}
button.loading::after{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  border:3px solid #020617;
  border-top:3px solid transparent;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:spin .8s linear infinite;
}

/* FORGOT */
.forgot{
  font-size:12px;
  color:#94a3b8;
  cursor:pointer;
  text-align:right;
  margin-top:-8px;
  margin-bottom:12px;
}
.forgot:hover{
  color:#22d3ee;
}

/* BACK */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:#020617;
  color:#22d3ee;
  cursor:pointer;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.modal-overlay.show{
  display:flex;
}
.modal-card{
  background:#020617;
  padding:20px;
  border-radius:12px;
  width:300px;
  text-align:center;
  border:1px solid #1e293b;
}
.modal-actions{
  margin-top:15px;
}
.btn-confirm{
  background:#22d3ee;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

/* CARET */
html, body{
  caret-color: transparent;
}
input, textarea{
  caret-color: black;
}

/* REMOVE DEFAULT PASSWORD ICON */
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear {
  display: none;
}
input[type="password"]::-webkit-credentials-auto-fill-button,
input[type="password"]::-webkit-textfield-decoration-container {
  display: none !important;
}
</style>
</head>

<body>

<div id="pageLoader">
  <div class="loader-spinner"></div>
</div>

<div class="back-btn" onclick="window.location.href='Main.html'">←</div>

<div class="auth-wrapper">

<div class="auth-header">
<h1>🔊 NoiseSense</h1>
<p>Smart Noise Monitoring System</p>
<div class="sound-wave">
<span></span><span></span><span></span><span></span><span></span>
</div>
</div>

<div class="auth-tabs">
<div class="active" onclick="switchTab('login',this)">LOGIN</div>
</div>

<!-- LOGIN -->
<div id="login" class="form active">
<label>Email</label>
<input id="loginEmail" type="email">

<label>Password</label>
<div class="password-field">
  <input id="loginPass" type="password">
  <span class="toggle-pass hide" onclick="togglePass('loginPass', this)">
  <svg viewBox="0 0 24 24" width="18" height="18">
    <path fill="currentColor"
      d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 13c-3.03 0-5.5-2.47-5.5-5.5S8.97 6.5 12 6.5 17.5 8.97 17.5 12 15.03 17.5 12 17.5zm0-9A3.5 3.5 0 0 0 8.5 12 3.5 3.5 0 0 0 12 15.5 3.5 3.5 0 0 0 15.5 12 3.5 3.5 0 0 0 12 8.5z"/>
  </svg>
</span>
</div>

<div class="forgot" onclick="pageLoader.classList.add('active'); setTimeout(()=>location.href='forgot.html',800)">
Forgot Password?
</div>

<button id="loginBtn" onclick="login()">LOGIN</button>
</div>

<!-- ERROR MODAL -->
<div id="errorModal" class="modal-overlay">
  <div class="modal-card">
    <h3 style="color:#ef4444;">Login Error</h3>
    <p id="errorMessage"></p>
    <div class="modal-actions">
      <button class="btn-confirm" id="closeError">OK</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://vuzgotyghqsyjdjrbuwu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1emdvdHlnaHFzeWpkanJidXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMDAyMzYsImV4cCI6MjA4NTc3NjIzNn0.Dwpc6plq3t_y7PB_B4lejhfOPNkmXULYb3KIkakVsRU"
);

window.togglePass = (id, el)=>{
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    el.classList.remove("hide");
    el.classList.add("show");
  }else{
    input.type = "password";
    el.classList.remove("show");
    el.classList.add("hide");
  }
};

window.login=async()=>{
  const btn=loginBtn;
  btn.classList.add("loading");

  const {error}=await supabase.auth.signInWithPassword({
    email:loginEmail.value,
    password:loginPass.value
  });

  if(error){
    btn.classList.remove("loading");
    errorMessage.textContent="Invalid email or password";
    errorModal.classList.add("show");
    return;
  }

  pageLoader.classList.add("active");
  setTimeout(()=>location.href="index.html",800);
};

</script>

</body>
</html>
