<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoiseSense | Login</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  color:#e5e7eb;
}

/* FULLSCREEN LOADER */
#pageLoader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  opacity:0;
  pointer-events:none;
  transition:opacity .4s ease;
}
#pageLoader.active{
  opacity:1;
  pointer-events:all;
}

.loader-spinner{
  width:50px;
  height:50px;
  border:5px solid #1e293b;
  border-top:5px solid #22d3ee;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* CARD */
.auth-wrapper{
  width:420px;
  background:#020617;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
  overflow:hidden;
}

/* HEADER */
.auth-header{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #1e293b;
}
.auth-header h1{
  margin:0;
  color:#22d3ee;
}
.auth-header p{
  margin-top:6px;
  font-size:13px;
  color:#94a3b8;
}

/* SOUND WAVE */
.sound-wave{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  height:36px;
  gap:4px;
  margin-top:10px;
}
.sound-wave span{
  width:6px;
  background:#22d3ee;
  border-radius:4px;
  animation:wave 1.2s infinite ease-in-out;
}
@keyframes wave{
  0%,100%{height:8px;opacity:.4}
  50%{height:30px;opacity:1}
}

/* TABS */
.auth-tabs{
  display:flex;
}
.auth-tabs div{
  flex:1;
  text-align:center;
  padding:14px;
  cursor:pointer;
  font-weight:600;
  color:#94a3b8;
}
.auth-tabs .active{
  color:#22d3ee;
  border-bottom:2px solid #22d3ee;
}

/* FORM */
.form{
  padding:22px;
  display:none;
}
.form.active{
  display:block;
}

input{
  width:100%;
  padding:11px;
  margin:6px 0 14px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  padding:11px;
  border:none;
  border-radius:8px;
  background:#22d3ee;
  font-weight:700;
  cursor:pointer;
  transition:all .25s ease;
  position:relative;
}

button:active{
  transform:scale(0.95);
}

button.loading{
  pointer-events:none;
  background:#0ea5e9;
  color:transparent;
}

button.loading::after{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  border:3px solid #020617;
  border-top:3px solid transparent;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:spin 0.8s linear infinite;
}

/* FORGOT */
.forgot{
  font-size:12px;
  color:#94a3b8;
  cursor:pointer;
  text-align:right;
  margin-top:-8px;
  margin-bottom:12px;
}
.forgot:hover{
  color:#22d3ee;
}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:#020617;
  color:#22d3ee;
  cursor:pointer;
}
/* REUSE SYSTEM STYLE */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-overlay.show{
  display:flex;
}

.modal-card{
  background:#020617;
  padding:20px;
  border-radius:12px;
  width:300px;
  text-align:center;
  border:1px solid #1e293b;
}

.modal-actions{
  margin-top:15px;
}

.btn-confirm{
  background:#22d3ee;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="pageLoader">
  <div class="loader-spinner"></div>
</div>

<div class="back-btn" onclick="goBack()">←</div>

<div class="auth-wrapper">

<div class="auth-header">
<h1>🔊 NoiseSense</h1>
<p>Smart Noise Monitoring System</p>
<div class="sound-wave">
<span></span><span></span><span></span><span></span><span></span>
</div>
</div>

<div class="auth-tabs">
<div class="active" onclick="switchTab('login',this)">LOGIN</div>
<div onclick="switchTab('signup',this)">SIGN UP</div>
</div>

<!-- LOGIN -->
<div id="login" class="form active">
<label>Email</label>
<input id="loginEmail" type="email">

<label>Password</label>
<input id="loginPass" type="password">

<!-- 🔥 ITO LANG BINAGO -->
<div class="forgot" onclick="pageLoader.classList.add('active'); setTimeout(()=>location.href='forgot.html',800)">
Forgot Password?
</div>

<button id="loginBtn" onclick="login()">LOGIN</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="form">
<input id="regEmail" type="email" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regConfirm" type="password" placeholder="Confirm Password">
<button onclick="signup()">SIGN UP</button>
</div>

</div>

<!-- ERROR MODAL -->
<div id="errorModal" class="modal-overlay">
  <div class="modal-card">
    <h3 style="color:#ef4444;">Login Error</h3>
    <p id="errorMessage"></p>

    <div class="modal-actions">
      <button class="btn-confirm" id="closeError">OK</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://vuzgotyghqsyjdjrbuwu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1emdvdHlnaHFzeWpkanJidXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMDAyMzYsImV4cCI6MjA4NTc3NjIzNn0.Dwpc6plq3t_y7PB_B4lejhfOPNkmXULYb3KIkakVsRU"
);

window.goBack = () => {
  document.getElementById("pageLoader").classList.add("active");
  setTimeout(()=>{
    location.href = "Main.html";
  },800);
};

window.login = async () => {

  const btn = document.getElementById("loginBtn");
  btn.classList.add("loading");

  const email = loginEmail.value.trim();
  const pass  = loginPass.value.trim();

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: pass
  });

  if(error){
  btn.classList.remove("loading");

  const msg = document.getElementById("errorMessage");
  const modal = document.getElementById("errorModal");

  // CUSTOM MESSAGE (mas professional)
  if(error.message.includes("Invalid login")){
    msg.textContent = "Invalid email or password.";
  }else if(error.message.includes("missing email")){
    msg.textContent = "Please enter your email and password.";
  }else{
    msg.textContent = error.message;
  }

  modal.classList.add("show");
  return;
}

  document.getElementById("pageLoader").classList.add("active");

  setTimeout(()=>{
    window.location.href = "index.html";
  },800);
};

window.signup = async () => {
const email=regEmail.value;
const pass=regPass.value;
const conf=regConfirm.value;

if(pass!==conf){ alert("Passwords do not match"); return; }

await supabase.auth.signUp({email,password:pass});
alert("Account created");
};

window.forgotPassword = async () => {
  // (hindi na ginagamit pero di tinanggal)
};

document.getElementById("login").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
login();
}
});

window.switchTab=(tab,el)=>{
document.querySelectorAll(".form").forEach(f=>f.classList.remove("active"));
document.querySelectorAll(".auth-tabs div").forEach(t=>t.classList.remove("active"));
document.getElementById(tab).classList.add("active");
el.classList.add("active");

};
document.getElementById("closeError").onclick = ()=>{
  document.getElementById("errorModal").classList.remove("show");
};


</script>
</body>
</html>
